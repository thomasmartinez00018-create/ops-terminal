name: Build Windows Installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install all dependencies
        run: npm ci --workspaces --include-workspace-root

      - name: Build frontend
        run: npm run build --workspace=packages/frontend

      - name: Generate Prisma client (Windows target)
        working-directory: packages/backend
        run: npx prisma generate

      - name: Build backend
        run: npm run build --workspace=packages/backend

      - name: Copy template DB to prisma/data
        shell: pwsh
        run: |
          $src = "packages/backend/prisma/stock-gastro.db"
          $dst = "packages/backend/prisma/data/stock-gastro.db"
          if (Test-Path $src) {
            New-Item -ItemType Directory -Force -Path "packages/backend/prisma/data"
            Copy-Item $src $dst
          } elseif (-not (Test-Path $dst)) {
            New-Item -ItemType Directory -Force -Path "packages/backend/prisma/data"
            New-Item -ItemType File -Path $dst
          }

      - name: Build Windows installer
        run: npm run build:win --workspace=packages/electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: OPS-Terminal-Windows
          path: dist-electron/*.exe
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist-electron/*.exe
          name: OPS Terminal ${{ github.ref_name }}
          body: |
            ## OPS Terminal ${{ github.ref_name }}

            ### Instalación en Windows
            1. Descargá el archivo `.exe`
            2. Ejecutalo como administrador
            3. Seguí el asistente de instalación
            4. Abrí **OPS Terminal** desde el acceso directo del escritorio

            ### Novedades
            - Módulo de Contabilidad y Facturación (Facturas A/B/C, Cuentas por Pagar, COGS)
            - Escáner de facturas con IA (Gemini)
            - Asistente IA flotante en todas las páginas
            - Página de Configuración con reset de fábrica
            - Fuentes y QR generados localmente (funciona sin internet)
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
