name: Build Windows Installer

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install all dependencies
        run: npm install
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Ensure app-builder binary exists
        shell: bash
        run: |
          BINARY="node_modules/app-builder-bin/win/x64/app-builder.exe"
          if [ -f "$BINARY" ]; then
            echo "app-builder.exe found ($(wc -c < "$BINARY") bytes)"
          else
            echo "app-builder.exe missing — extracting from npm tarball..."
            mkdir -p tmp_extract
            curl -sL "https://registry.npmjs.org/app-builder-bin/-/app-builder-bin-5.0.0-alpha.10.tgz" -o tmp_extract/pkg.tgz
            cd tmp_extract && tar xzf pkg.tgz && cd ..
            mkdir -p "node_modules/app-builder-bin/win/x64"
            cp "tmp_extract/package/win/x64/app-builder.exe" "$BINARY"
            rm -rf tmp_extract
            echo "Extracted app-builder.exe from tarball"
          fi
          # Final check
          if [ ! -f "$BINARY" ]; then
            echo "FATAL: app-builder.exe still not found"
            exit 1
          fi
          echo "Verified: app-builder.exe present"

      - name: Generate Prisma client (binaries Windows)
        run: npx prisma generate
        working-directory: packages/backend

      - name: Create database schema
        run: npx prisma db push
        working-directory: packages/backend
        env:
          DATABASE_URL: file:./prisma/data/stock-gastro.db

      - name: Seed initial data
        run: npx tsx prisma/seed.ts
        working-directory: packages/backend
        env:
          DATABASE_URL: file:./prisma/data/stock-gastro.db

      - name: Build frontend + backend
        run: npm run build

      - name: Build Windows .exe
        run: npm --workspace=packages/electron run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload .exe as artifact
        uses: actions/upload-artifact@v4
        with:
          name: OPS-Terminal-Windows
          path: dist-electron/*.exe
          retention-days: 30

      - name: Create GitHub Release (solo en tags)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist-electron/*.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
