name: Build Windows Installer

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install all dependencies
        run: npm ci

      - name: Verify app-builder binary
        shell: bash
        run: |
          if [ -f "node_modules/app-builder-bin/win/x64/app-builder.exe" ]; then
            echo "app-builder.exe found at root node_modules"
          else
            echo "Not at root, searching..."
            BINARY=$(find . -type f -name "app-builder.exe" -path "*/app-builder-bin/*" 2>/dev/null | head -1)
            if [ -n "$BINARY" ]; then
              echo "Found at: $BINARY"
            else
              echo "FATAL: app-builder.exe not found anywhere"
              echo "=== root node_modules ==="
              ls node_modules/app-builder-bin/ 2>/dev/null || echo "not in root"
              echo "=== electron node_modules ==="
              ls packages/electron/node_modules/app-builder-bin/ 2>/dev/null || echo "not in electron"
              exit 1
            fi
          fi

      - name: Ensure prisma data directory
        run: mkdir -p packages/backend/prisma/data
        shell: bash

      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: packages/backend

      - name: Create database schema
        run: npx prisma db push
        working-directory: packages/backend
        env:
          DATABASE_URL: file:./prisma/data/stock-gastro.db

      - name: Seed initial data
        run: npx tsx prisma/seed.ts
        working-directory: packages/backend
        env:
          DATABASE_URL: file:./prisma/data/stock-gastro.db

      - name: Build frontend + backend
        run: npm run build

      - name: Build Windows .exe
        run: npm --workspace=packages/electron run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List build output
        shell: bash
        run: ls -la dist-electron/ 2>/dev/null || ls -la packages/electron/dist/ 2>/dev/null || echo "No output found"

      - name: Upload .exe as artifact
        uses: actions/upload-artifact@v4
        with:
          name: OPS-Terminal-Windows
          path: dist-electron/*.exe
          retention-days: 30

      - name: Create GitHub Release (solo en tags)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist-electron/*.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
