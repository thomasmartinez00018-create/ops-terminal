name: Build Windows Installer

on:
  workflow_dispatch:        # botón manual en GitHub
  push:
    tags:
      - 'v*'               # también al hacer: git tag v1.0.1 && git push --tags

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install all dependencies
        run: npm ci
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Ensure app-builder binary exists
        shell: pwsh
        run: |
          $binaryPath = "node_modules\app-builder-bin\win\x64\app-builder.exe"
          if (Test-Path $binaryPath) {
            Write-Host "✅ app-builder.exe already present"
          } else {
            Write-Host "⚠️ app-builder.exe missing — extracting from npm tarball..."
            $tmpDir = New-Item -ItemType Directory -Force -Path "tmp_app_builder"
            $tgzPath = Join-Path $tmpDir "app-builder-bin.tgz"
            Invoke-WebRequest -Uri "https://registry.npmjs.org/app-builder-bin/-/app-builder-bin-5.0.0-alpha.10.tgz" -OutFile $tgzPath -UseBasicParsing
            Push-Location $tmpDir
            tar -xzf "app-builder-bin.tgz"
            Pop-Location
            $extractedBin = Join-Path $tmpDir "package\win\x64\app-builder.exe"
            if (Test-Path $extractedBin) {
              $targetDir = "node_modules\app-builder-bin\win\x64"
              New-Item -ItemType Directory -Force -Path $targetDir | Out-Null
              Copy-Item $extractedBin "$targetDir\app-builder.exe" -Force
              Write-Host "✅ Successfully extracted app-builder.exe from tarball"
            } else {
              Write-Host "Extracted contents:"
              Get-ChildItem -Path $tmpDir -Recurse | Select-Object FullName
              Write-Error "❌ Could not find app-builder.exe in extracted tarball"
              exit 1
            }
            Remove-Item -Recurse -Force $tmpDir
          }
          # Final verification
          if (-not (Test-Path $binaryPath)) {
            Write-Error "❌ app-builder.exe still not found after all attempts"
            exit 1
          }
          $size = (Get-Item $binaryPath).Length
          Write-Host "✅ Verified: app-builder.exe exists ($size bytes)"

      - name: Generate Prisma client (binaries Windows)
        run: npx prisma generate
        working-directory: packages/backend

      - name: Create database schema
        run: npx prisma db push
        working-directory: packages/backend
        env:
          DATABASE_URL: file:./prisma/data/stock-gastro.db

      - name: Seed initial data
        run: npx tsx prisma/seed.ts
        working-directory: packages/backend
        env:
          DATABASE_URL: file:./prisma/data/stock-gastro.db

      - name: Build frontend + backend
        run: npm run build

      - name: Build Windows .exe
        run: npm --workspace=packages/electron run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload .exe as artifact
        uses: actions/upload-artifact@v4
        with:
          name: OPS-Terminal-Windows
          path: dist-electron/*.exe
          retention-days: 30

      - name: Create GitHub Release (solo en tags)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist-electron/*.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
