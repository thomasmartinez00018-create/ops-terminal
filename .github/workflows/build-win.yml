name: Build Windows Installer (Cloud Shell)

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install electron workspace deps
        shell: bash
        run: |
          # El installer ya no bundlea backend — solo necesita Electron y electron-builder.
          # npm ci desde la raíz instala el workspace completo incluyendo packages/electron.
          npm ci

      - name: Verify icon exists
        shell: bash
        run: |
          ls -la packages/electron/assets/icon.ico || { echo "FATAL: icon.ico missing"; exit 1; }
          echo "Icon OK"

      # ── Firma de código (self-signed fallback) ────────────────────────────
      - name: Prepare signing certificate
        id: cert
        shell: pwsh
        run: |
          if ($env:WINDOWS_PFX_BASE64) {
            Write-Host "Usando certificado provisto via secret WINDOWS_PFX_BASE64"
            [IO.File]::WriteAllBytes("$env:RUNNER_TEMP\cert.pfx", [Convert]::FromBase64String($env:WINDOWS_PFX_BASE64))
            echo "CSC_LINK=$env:RUNNER_TEMP\cert.pfx" >> $env:GITHUB_ENV
            echo "CSC_KEY_PASSWORD=$env:WINDOWS_PFX_PASSWORD" >> $env:GITHUB_ENV
            echo "mode=real" >> $env:GITHUB_OUTPUT
          } else {
            Write-Host "Generando certificado self-signed temporal"
            $pwd = ConvertTo-SecureString -String "ops-temporary-cert" -Force -AsPlainText
            $cert = New-SelfSignedCertificate `
              -Subject "CN=Mas Organicos, O=Mas Organicos, C=AR" `
              -Type CodeSigningCert `
              -KeyAlgorithm RSA `
              -KeyLength 2048 `
              -HashAlgorithm SHA256 `
              -NotAfter (Get-Date).AddYears(3) `
              -CertStoreLocation "Cert:\CurrentUser\My"
            $pfxPath = "$env:RUNNER_TEMP\selfsigned.pfx"
            Export-PfxCertificate -Cert $cert -FilePath $pfxPath -Password $pwd | Out-Null
            echo "CSC_LINK=$pfxPath" >> $env:GITHUB_ENV
            echo "CSC_KEY_PASSWORD=ops-temporary-cert" >> $env:GITHUB_ENV
            echo "mode=selfsigned" >> $env:GITHUB_OUTPUT
          }
        env:
          WINDOWS_PFX_BASE64: ${{ secrets.WINDOWS_PFX_BASE64 }}
          WINDOWS_PFX_PASSWORD: ${{ secrets.WINDOWS_PFX_PASSWORD }}

      - name: Build Windows .exe
        run: npm run build:win
        working-directory: packages/electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ env.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ env.CSC_KEY_PASSWORD }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          # La URL cloud se baked en el installer si querés override por tag.
          # Por default main.js usa https://ops-terminal.vercel.app
          OPS_CLOUD_URL: ${{ vars.OPS_CLOUD_URL }}

      - name: List build output
        shell: bash
        run: ls -la dist-electron/ 2>/dev/null || echo "No output"

      - name: Compute installer hash (SHA256)
        shell: bash
        run: |
          cd dist-electron
          for f in *.exe; do
            echo "=== $f ==="
            sha256sum "$f"
            echo "Size: $(du -h "$f" | cut -f1)"
          done

      - name: Verify signature
        shell: pwsh
        continue-on-error: true
        run: |
          $exe = Get-ChildItem -Path dist-electron -Filter *.exe | Select-Object -First 1
          if ($exe) {
            Write-Host "Verificando firma de $($exe.Name)"
            $sig = Get-AuthenticodeSignature $exe.FullName
            Write-Host "  Status: $($sig.Status)"
            Write-Host "  Signer: $($sig.SignerCertificate.Subject)"
            Write-Host "  Hash algorithm: $($sig.HashAlgorithm)"
          }

      - name: Upload .exe as artifact
        uses: actions/upload-artifact@v4
        with:
          name: OPS-Terminal-Windows
          path: dist-electron/*.exe
          retention-days: 30

      - name: Create GitHub Release (solo en tags)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist-electron/*.exe
          generate_release_notes: true
          body: |
            ## OPS Terminal ${{ github.ref_name }}

            **Cloud Shell Build** — el instalador conecta directo al servidor en la nube.
            No requiere configuración de red local.

            ### Instalación en Windows
            1. Descargá `OPS-Terminal-Setup-*.exe`
            2. Ejecutá el instalador (si SmartScreen advierte, click "More info" → "Run anyway")
            3. Seguí el asistente — no requiere permisos de administrador
            4. Abrí **OPS Terminal** desde el acceso directo del escritorio

            ### Requisitos
            - Conexión a internet
            - Windows 10/11 x64

            Los datos del restaurante se sincronizan automáticamente con el servidor
            en la nube. Cualquier dispositivo con el usuario y PIN puede acceder.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
