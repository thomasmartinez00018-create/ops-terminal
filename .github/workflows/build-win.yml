name: Build Windows Installer

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Install electron workspace dependencies
        run: npm ci
        working-directory: packages/electron

      - name: Ensure prisma data directory
        run: mkdir -p packages/backend/prisma/data
        shell: bash

      - name: Generate Prisma client
        run: npm exec --no -- prisma generate
        working-directory: packages/backend

      - name: Create database schema
        run: npm exec --no -- prisma db push
        working-directory: packages/backend
        env:
          DATABASE_URL: file:./prisma/data/stock-gastro.db

      - name: Seed initial data
        run: npm exec --no -- tsx prisma/seed.ts
        working-directory: packages/backend
        env:
          DATABASE_URL: file:./prisma/data/stock-gastro.db

      - name: Build frontend + backend
        run: npm run build

      - name: Build Windows .exe
        run: npm run build:win
        working-directory: packages/electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List build output
        shell: bash
        run: ls -la dist-electron/ 2>/dev/null || echo "No output found"

      - name: Upload .exe as artifact
        uses: actions/upload-artifact@v4
        with:
          name: OPS-Terminal-Windows
          path: dist-electron/*.exe
          retention-days: 30

      - name: Create GitHub Release (solo en tags)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist-electron/*.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
