name: Build Windows Installer

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install all dependencies
        run: npm ci

      - name: Ensure prisma data directory
        shell: bash
        run: mkdir -p packages/backend/prisma/data

      - name: Generate Prisma client
        shell: bash
        working-directory: packages/backend
        run: npx prisma generate

      - name: Create database schema
        shell: bash
        working-directory: packages/backend
        run: npx prisma db push --accept-data-loss
        env:
          DATABASE_URL: file:${{ github.workspace }}/packages/backend/prisma/data/stock-gastro.db

      - name: Seed initial data
        shell: bash
        working-directory: packages/backend
        run: |
          npx tsx prisma/seed.ts
          echo "=== DB created ==="
          ls -la prisma/data/
        env:
          DATABASE_URL: file:${{ github.workspace }}/packages/backend/prisma/data/stock-gastro.db

      - name: Build frontend + backend
        run: npm run build

      - name: Inject Gemini API key into backend dist
        shell: bash
        run: |
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > packages/backend/dist/.env.production
          echo "Gemini key injected into dist/"

      - name: Create standalone backend node_modules for packaging
        shell: bash
        run: |
          # npm workspaces hoists deps to root — packages/backend/node_modules is nearly empty.
          # Electron needs a self-contained node_modules inside the packaged app.
          # Create a temp dir, install production deps outside workspace context, copy back.
          TMPDIR=$(mktemp -d)
          cp packages/backend/package.json "$TMPDIR/"
          cd "$TMPDIR"
          npm install --production --ignore-scripts 2>&1 | tail -5
          echo "Installed $(ls node_modules | wc -l) packages"
          # Replace the nearly-empty workspace node_modules with the standalone one
          rm -rf "$OLDPWD/packages/backend/node_modules"
          mv node_modules "$OLDPWD/packages/backend/node_modules"
          cd "$OLDPWD"
          # Restore .prisma/client (generated by prisma generate earlier)
          # It was in the workspace node_modules, re-generate into the new standalone one
          npx prisma generate --schema=packages/backend/prisma/schema.prisma
          echo "Backend node_modules ready: $(ls packages/backend/node_modules | wc -l) top-level packages"

      - name: Verify packagable assets
        shell: bash
        run: |
          echo "=== template.db ==="
          ls -la packages/backend/prisma/data/stock-gastro.db || { echo "FATAL: template.db not found"; exit 1; }
          echo "=== .prisma/client ==="
          ls packages/backend/node_modules/.prisma/client/ || { echo "FATAL: .prisma/client missing"; exit 1; }
          echo "=== backend dist ==="
          ls packages/backend/dist/server.js || { echo "FATAL: server.js not found"; exit 1; }
          echo "=== frontend dist ==="
          ls packages/frontend/dist/index.html || { echo "FATAL: frontend not built"; exit 1; }
          echo "All assets verified ✓"

      - name: Build Windows .exe
        run: npm run build:win
        working-directory: packages/electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List build output
        shell: bash
        run: ls -la dist-electron/ 2>/dev/null || echo "Checking packages/electron output" && ls -la packages/electron/dist/ 2>/dev/null || echo "No output found"

      - name: Upload .exe as artifact
        uses: actions/upload-artifact@v4
        with:
          name: OPS-Terminal-Windows
          path: dist-electron/*.exe
          retention-days: 30

      - name: Create GitHub Release (solo en tags)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist-electron/*.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
