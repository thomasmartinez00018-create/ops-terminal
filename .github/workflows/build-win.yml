name: Build Windows Installer

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install all dependencies
        run: npm ci

      - name: Ensure prisma data directory
        shell: bash
        run: mkdir -p packages/backend/prisma/data

      - name: Generate Prisma client
        shell: bash
        working-directory: packages/backend
        run: npx prisma generate

      - name: Create database schema
        shell: bash
        working-directory: packages/backend
        run: npx prisma db push --accept-data-loss
        env:
          DATABASE_URL: file:${{ github.workspace }}/packages/backend/prisma/data/stock-gastro.db

      - name: Seed initial data
        shell: bash
        working-directory: packages/backend
        run: |
          npx tsx prisma/seed.ts
          echo "=== DB created ==="
          ls -la prisma/data/
        env:
          DATABASE_URL: file:${{ github.workspace }}/packages/backend/prisma/data/stock-gastro.db

      - name: Build frontend + backend
        run: npm run build

      - name: Inject Gemini API key into backend dist
        shell: bash
        run: |
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > packages/backend/dist/.env.production
          echo "Gemini key injected into dist/"

      - name: Create standalone backend node_modules for packaging
        shell: bash
        run: |
          # npm workspaces hoists deps to root — packages/backend/node_modules is nearly empty.
          # Electron needs a self-contained node_modules inside the packaged app.
          # Create a temp dir, install production deps outside workspace context, copy back.
          TMPDIR=$(mktemp -d)
          cp packages/backend/package.json "$TMPDIR/"
          cd "$TMPDIR"
          npm install --production --ignore-scripts 2>&1 | tail -5
          echo "Installed $(ls node_modules | wc -l) packages"
          # Replace the nearly-empty workspace node_modules with the standalone one
          rm -rf "$OLDPWD/packages/backend/node_modules"
          mv node_modules "$OLDPWD/packages/backend/node_modules"
          cd "$OLDPWD"
          # Restore .prisma/client (generated by prisma generate earlier)
          # It was in the workspace node_modules, re-generate into the new standalone one
          npx prisma generate --schema=packages/backend/prisma/schema.prisma
          echo "Backend node_modules ready: $(ls packages/backend/node_modules | wc -l) top-level packages"

      - name: Verify packagable assets
        shell: bash
        run: |
          echo "=== template.db ==="
          ls -la packages/backend/prisma/data/stock-gastro.db || { echo "FATAL: template.db not found"; exit 1; }
          echo "=== .prisma/client ==="
          ls packages/backend/node_modules/.prisma/client/ || { echo "FATAL: .prisma/client missing"; exit 1; }
          echo "=== backend dist ==="
          ls packages/backend/dist/server.js || { echo "FATAL: server.js not found"; exit 1; }
          echo "=== frontend dist ==="
          ls packages/frontend/dist/index.html || { echo "FATAL: frontend not built"; exit 1; }
          echo "=== icon ==="
          ls -la packages/electron/assets/icon.ico || { echo "FATAL: icon.ico missing"; exit 1; }
          echo "All assets verified OK"

      # ── Firma de código ──────────────────────────────────────────────────
      # Prioridad:
      # 1. Si existe WINDOWS_PFX_BASE64 + WINDOWS_PFX_PASSWORD → firma real
      #    (el secret es un cert .pfx codificado en base64).
      # 2. Si no, genera self-signed on-the-fly: no da reputación SmartScreen
      #    pero sí da hash Authenticode válido + firma el binario, lo cual
      #    SATISFACE a muchos heurísticos de AV que flaggean "unsigned exe".
      # 3. Cuando contratés Azure Trusted Signing, se activa el bloque de
      #    abajo automáticamente por el secret AZURE_TENANT_ID.
      - name: Prepare signing certificate
        id: cert
        shell: pwsh
        run: |
          if ($env:WINDOWS_PFX_BASE64) {
            Write-Host "Usando certificado provisto via secret WINDOWS_PFX_BASE64"
            [IO.File]::WriteAllBytes("$env:RUNNER_TEMP\cert.pfx", [Convert]::FromBase64String($env:WINDOWS_PFX_BASE64))
            echo "CSC_LINK=$env:RUNNER_TEMP\cert.pfx" >> $env:GITHUB_ENV
            echo "CSC_KEY_PASSWORD=$env:WINDOWS_PFX_PASSWORD" >> $env:GITHUB_ENV
            echo "mode=real" >> $env:GITHUB_OUTPUT
          } else {
            Write-Host "Generando certificado self-signed temporal (mejora heurísticas AV pero NO da SmartScreen reputation)"
            $pwd = ConvertTo-SecureString -String "ops-temporary-cert" -Force -AsPlainText
            $cert = New-SelfSignedCertificate `
              -Subject "CN=Mas Organicos, O=Mas Organicos, C=AR" `
              -Type CodeSigningCert `
              -KeyAlgorithm RSA `
              -KeyLength 2048 `
              -HashAlgorithm SHA256 `
              -NotAfter (Get-Date).AddYears(3) `
              -CertStoreLocation "Cert:\CurrentUser\My"
            $pfxPath = "$env:RUNNER_TEMP\selfsigned.pfx"
            Export-PfxCertificate -Cert $cert -FilePath $pfxPath -Password $pwd | Out-Null
            echo "CSC_LINK=$pfxPath" >> $env:GITHUB_ENV
            echo "CSC_KEY_PASSWORD=ops-temporary-cert" >> $env:GITHUB_ENV
            echo "mode=selfsigned" >> $env:GITHUB_OUTPUT
            Write-Host "Self-signed cert generado en $pfxPath"
          }
        env:
          WINDOWS_PFX_BASE64: ${{ secrets.WINDOWS_PFX_BASE64 }}
          WINDOWS_PFX_PASSWORD: ${{ secrets.WINDOWS_PFX_PASSWORD }}

      - name: Build Windows .exe
        run: npm run build:win
        working-directory: packages/electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ env.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ env.CSC_KEY_PASSWORD }}
          # Si un self-signed falla el timestamping, no abortar el build
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      # ── Azure Trusted Signing (activación futura) ────────────────────────
      # Cuando tengas una cuenta de Azure Trusted Signing contratada (~10 USD/mes):
      # 1. Crear Azure AD App Registration con rol "Trusted Signing Certificate Profile Signer"
      # 2. Agregar estos secrets al repo:
      #    AZURE_TENANT_ID, AZURE_CLIENT_ID, AZURE_CLIENT_SECRET,
      #    AZURE_ENDPOINT, AZURE_CODE_SIGNING_NAME, AZURE_CERT_PROFILE_NAME
      # 3. Descomentar el step de abajo — ejecuta post-build, re-firma con Azure
      # - name: Sign with Azure Trusted Signing
      #   if: env.AZURE_TENANT_ID != ''
      #   uses: azure/trusted-signing-action@v0.5.1
      #   with:
      #     azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
      #     azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
      #     azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
      #     endpoint: ${{ secrets.AZURE_ENDPOINT }}
      #     trusted-signing-account-name: ${{ secrets.AZURE_CODE_SIGNING_NAME }}
      #     certificate-profile-name: ${{ secrets.AZURE_CERT_PROFILE_NAME }}
      #     files-folder: dist-electron
      #     files-folder-filter: exe
      #     file-digest: SHA256
      #     timestamp-rfc3161: http://timestamp.acs.microsoft.com
      #     timestamp-digest: SHA256

      - name: List build output
        shell: bash
        run: |
          ls -la dist-electron/ 2>/dev/null || echo "Checking packages/electron output"
          ls -la packages/electron/dist/ 2>/dev/null || echo "No output found"

      - name: Compute installer hash (SHA256)
        shell: bash
        run: |
          cd dist-electron
          for f in *.exe; do
            echo "=== $f ==="
            sha256sum "$f"
            echo "Size: $(du -h "$f" | cut -f1)"
          done

      - name: Verify signature on installer
        shell: pwsh
        continue-on-error: true
        run: |
          $exe = Get-ChildItem -Path dist-electron -Filter *.exe | Select-Object -First 1
          if ($exe) {
            Write-Host "Verificando firma de $($exe.Name)"
            $sig = Get-AuthenticodeSignature $exe.FullName
            Write-Host "  Status: $($sig.Status)"
            Write-Host "  Signer: $($sig.SignerCertificate.Subject)"
            Write-Host "  Hash algorithm: $($sig.HashAlgorithm)"
            Write-Host "  Timestamp: $($sig.TimeStamperCertificate.Subject)"
          }

      - name: Upload .exe as artifact
        uses: actions/upload-artifact@v4
        with:
          name: OPS-Terminal-Windows
          path: dist-electron/*.exe
          retention-days: 30

      - name: Create GitHub Release (solo en tags)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist-electron/*.exe
          generate_release_notes: true
          body: |
            ## OPS Terminal ${{ github.ref_name }}

            **Hash SHA256 del instalador:** (ver logs del workflow para verificación)

            ### Instalación en Windows
            1. Descargá `OPS-Terminal-Setup-*.exe`
            2. Ejecutá el instalador (si Windows SmartScreen advierte, click en "More info" → "Run anyway")
            3. Seguí el asistente — no requiere permisos de administrador
            4. Abrí **OPS Terminal** desde el acceso directo del escritorio

            ### Nota sobre antivirus
            Firmado con certificado self-signed (modo: ${{ steps.cert.outputs.mode }}).
            Algunos antivirus pueden mostrar advertencias de "publisher desconocido"
            hasta que acumulemos reputación con SmartScreen o firmemos con un cert
            comercial (Azure Trusted Signing está pre-configurado).
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
