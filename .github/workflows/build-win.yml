name: Build Windows Installer

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install all dependencies
        run: npm ci

      - name: Verify app-builder binary
        shell: bash
        run: |
          BINARY="node_modules/app-builder-bin/win/x64/app-builder.exe"
          if [ -f "$BINARY" ]; then
            echo "app-builder.exe present ($(wc -c < "$BINARY") bytes)"
          else
            echo "Contents of app-builder-bin:"
            ls -laR node_modules/app-builder-bin/ || echo "Package not found"
            echo "FATAL: app-builder.exe not found"
            exit 1
          fi

      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: packages/backend

      - name: Create database schema
        run: npx prisma db push
        working-directory: packages/backend
        env:
          DATABASE_URL: file:./prisma/data/stock-gastro.db

      - name: Seed initial data
        run: npx tsx prisma/seed.ts
        working-directory: packages/backend
        env:
          DATABASE_URL: file:./prisma/data/stock-gastro.db

      - name: Build frontend + backend
        run: npm run build

      - name: Build Windows .exe
        run: npm --workspace=packages/electron run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload .exe as artifact
        uses: actions/upload-artifact@v4
        with:
          name: OPS-Terminal-Windows
          path: dist-electron/*.exe
          retention-days: 30

      - name: Create GitHub Release (solo en tags)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist-electron/*.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
