<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>OPS Terminal</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0A0A0A;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #D4AF37;
      user-select: none;
    }
    .logo {
      font-size: 2.5rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      margin-bottom: 0.25rem;
    }
    .logo span { color: #D4AF37; }
    .sub {
      font-size: 0.75rem;
      letter-spacing: 0.3em;
      color: #666;
      text-transform: uppercase;
      margin-bottom: 3rem;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #262626;
      border-top-color: #D4AF37;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .msg {
      margin-top: 1.5rem;
      font-size: 0.8rem;
      color: #555;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <div class="logo"><span>OPS</span>TERMINAL</div>
  <div class="sub">Stock Gastro</div>
  <div class="spinner"></div>
  <div class="msg">Iniciando sistema...</div>
</body>
</html>
