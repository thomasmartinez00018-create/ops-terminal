<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>OPS Terminal - Error</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0A0A0A;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #fff;
    }
    h1  { font-size: 1.4rem; color: #ef4444; margin-bottom: 0.75rem; }
    .sub { color: #888; font-size: 0.85rem; margin-bottom: 1.5rem; }
    .log-box {
      background: #111;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 1rem;
      width: 100%;
      max-width: 700px;
      font-family: monospace;
      font-size: 0.75rem;
      color: #f87171;
      max-height: 260px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
      margin-bottom: 1rem;
    }
    .path-box {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 4px;
      padding: 0.5rem 0.75rem;
      width: 100%;
      max-width: 700px;
      font-family: monospace;
      font-size: 0.72rem;
      color: #D4AF37;
      margin-bottom: 1.5rem;
      word-break: break-all;
    }
    .label { font-size: 0.72rem; color: #555; margin-bottom: 0.25rem; }
    .buttons { display: flex; gap: 0.75rem; }
    button {
      padding: 0.55rem 1.25rem;
      background: #D4AF37;
      color: #000;
      border: none;
      border-radius: 4px;
      font-weight: 700;
      cursor: pointer;
      font-size: 0.85rem;
    }
    button.sec {
      background: #222;
      color: #888;
      border: 1px solid #333;
    }
  </style>
</head>
<body>
  <h1>⚠ El servidor no pudo iniciar</h1>
  <p class="sub">Hubo un error al levantar el backend. Detalle:</p>

  <div class="log-box" id="detail">Cargando...</div>

  <p class="label">Archivo de log completo:</p>
  <div class="path-box" id="logPath">—</div>

  <div class="buttons">
    <button onclick="location.reload()">↺ Reintentar</button>
    <button class="sec" onclick="copyLog()">📋 Copiar log</button>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search.slice(1) || '')
    const data   = params.get('data') || ''
    const inner  = new URLSearchParams(data)
    const detail  = inner.get('detail') || 'Sin información disponible'
    const logPath = inner.get('logPath') || '—'

    document.getElementById('detail').textContent  = detail
    document.getElementById('logPath').textContent = logPath

    function copyLog () {
      navigator.clipboard.writeText(detail + '\n\nLog: ' + logPath)
        .then(() => alert('Log copiado'))
    }
  </script>
</body>
</html>
