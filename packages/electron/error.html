<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>OPS Terminal - Error</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0A0A0A;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #fff;
    }
    h1 { font-size: 1.5rem; color: #ef4444; margin-bottom: 1rem; }
    p  { color: #888; font-size: 0.9rem; margin-bottom: 0.5rem; }
    button {
      margin-top: 2rem;
      padding: 0.6rem 1.5rem;
      background: #D4AF37;
      color: #000;
      border: none;
      border-radius: 4px;
      font-weight: 700;
      cursor: pointer;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <h1>Error al iniciar</h1>
  <p>El servidor no pudo inicializarse.</p>
  <p>Reiniciá la aplicación o contactá soporte.</p>
  <button onclick="window.location.reload()">Reintentar</button>
</body>
</html>
